<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Agents</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; height: 100vh; display: flex; overflow: hidden; }

  /* Sidebar */
  .sidebar { width: 220px; background: #141414; border-right: 1px solid #2a2a2a; display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-title { padding: 20px 16px 12px; font-size: 11px; font-weight: 700; letter-spacing: 1px; color: #555; text-transform: uppercase; }
  .agent-list { display: flex; flex-direction: column; gap: 4px; padding: 0 8px; }
  .agent-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: background 0.15s; border: none; background: transparent; color: #aaa; font-size: 14px; text-align: left; width: 100%; }
  .agent-item:hover { background: #1e1e1e; color: #e0e0e0; }
  .agent-item.active { background: #1e1e2e; color: #fff; }
  .agent-item .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .unread { margin-left: auto; background: #7c3aed; color: #fff; font-size: 10px; border-radius: 10px; padding: 1px 6px; display: none; }
  .sidebar-footer { margin-top: auto; padding: 16px; border-top: 1px solid #2a2a2a; font-size: 11px; color: #444; }

  /* Main chat area */
  .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .chat-header { padding: 16px 20px; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; gap: 12px; background: #141414; flex-shrink: 0; }
  .chat-header .agent-icon { font-size: 22px; }
  .chat-header-info h2 { font-size: 15px; font-weight: 600; }
  .chat-header-info p { font-size: 12px; color: #555; margin-top: 2px; }
  .clear-btn { margin-left: auto; background: transparent; border: 1px solid #2a2a2a; color: #555; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .clear-btn:hover { border-color: #444; color: #aaa; }

  /* Messages */
  .messages { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; }
  .msg { display: flex; flex-direction: column; max-width: 80%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.assistant { align-self: flex-start; align-items: flex-start; }
  .msg-bubble { padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
  .msg.user .msg-bubble { background: #7c3aed; color: #fff; border-bottom-right-radius: 4px; }
  .msg.assistant .msg-bubble { background: #1e1e1e; border: 1px solid #2a2a2a; border-bottom-left-radius: 4px; }
  .msg.system { align-self: center; }
  .msg.system .msg-bubble { background: transparent; color: #444; font-size: 12px; border: none; padding: 4px; }
  .msg-time { font-size: 10px; color: #444; margin-top: 4px; padding: 0 4px; }

  /* Typing */
  .typing-indicator { align-self: flex-start; padding: 12px 16px; background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 16px; border-bottom-left-radius: 4px; display: none; }
  .typing-indicator span { display: inline-block; width: 6px; height: 6px; background: #555; border-radius: 50%; margin: 0 2px; animation: bounce 1.2s infinite; }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  /* Input */
  .input-area { padding: 16px 20px; border-top: 1px solid #2a2a2a; background: #141414; flex-shrink: 0; }
  .input-row { display: flex; gap: 10px; align-items: flex-end; }
  .input-row textarea { flex: 1; background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 12px; color: #e0e0e0; padding: 12px 16px; font-size: 14px; resize: none; min-height: 44px; max-height: 120px; font-family: inherit; line-height: 1.5; }
  .input-row textarea:focus { outline: none; border-color: #7c3aed; }
  .send-btn { width: 44px; height: 44px; background: #7c3aed; border: none; border-radius: 10px; color: #fff; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .send-btn:hover { background: #6d28d9; }
  .send-btn:disabled { background: #333; cursor: not-allowed; }
  .input-hint { font-size: 11px; color: #333; margin-top: 6px; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-title">My Agents</div>
  <div class="agent-list">
    <button class="agent-item active" onclick="switchAgent('homework')" id="tab-homework">
      <div class="dot" style="background:#7c3aed"></div> 📚 Homework
      <span class="unread" id="unread-homework"></span>
    </button>
    <button class="agent-item" onclick="switchAgent('research')" id="tab-research">
      <div class="dot" style="background:#0369a1"></div> 🔍 Research
      <span class="unread" id="unread-research"></span>
    </button>
    <button class="agent-item" onclick="switchAgent('brain')" id="tab-brain">
      <div class="dot" style="background:#065f46"></div> 🧠 Brain
      <span class="unread" id="unread-brain"></span>
    </button>
    <button class="agent-item" onclick="switchAgent('general')" id="tab-general">
      <div class="dot" style="background:#92400e"></div> 💬 General
      <span class="unread" id="unread-general"></span>
    </button>
  </div>
  <div class="sidebar-footer">🧠 My Brain • Connected</div>
</div>

<div class="chat-area">
  <div class="chat-header">
    <div class="agent-icon" id="agent-icon">📚</div>
    <div class="chat-header-info">
      <h2 id="agent-name">Homework Agent</h2>
      <p id="agent-desc">Reads your question and writes a complete response</p>
    </div>
    <button class="clear-btn" onclick="clearChat()">Clear chat</button>
  </div>
  <div class="messages" id="messages"></div>
  <div class="typing-indicator" id="typing"><span></span><span></span><span></span></div>
  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="Type a message..." onkeydown="handleKey(event)" rows="1" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="send()">↑</button>
    </div>
    <div class="input-hint" id="input-hint">Tip: For homework, paste your discussion question or say "do my MGT-325 homework"</div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://yqjsfeboqsotrgknyzkb.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxanNmZWJvcXNvdHJna255emtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNTI4OTIsImV4cCI6MjA5NzkyODg5Mn0.G9xlPmiHivtf4Pss0Ja0m2YnT2qHh__9izkv0EXC_B8";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const AGENTS = {
  homework: {
    icon: "📚", name: "Homework Agent",
    desc: "Reads your question and writes a complete response",
    hint: "Paste your discussion question or say which class",
    color: "#7c3aed",
    system: `You are an expert academic writing assistant for a GCU student named Caleb. When given a discussion question, you:
1. Briefly explain what the question is asking
2. Write a COMPLETE, ready-to-submit discussion post (150-250 words, first person, academic tone, real-world example)
3. End with a note reminding Caleb to review before submitting

Always write the full response, not just an outline. Sound like a thoughtful student, not a textbook.`,
    welcome: "Hi Caleb! Paste your discussion question and I'll write a complete response for you. You review it, then submit yourself."
  },
  research: {
    icon: "🔍", name: "Research Agent",
    desc: "Searches your brain and summarizes topics",
    hint: "Ask me to research any topic",
    color: "#0369a1",
    system: `You are a research assistant with access to Caleb's personal knowledge base. When asked to research a topic:
1. Search the brain for relevant saved notes
2. Summarize key points clearly
3. Suggest follow-up questions or angles to explore
Be concise, practical, and point out connections to things Caleb has already learned.`,
    welcome: "What do you want to research? I'll search your brain for relevant notes and give you a summary."
  },
  brain: {
    icon: "🧠", name: "Brain Agent",
    desc: "Manage your knowledge base",
    hint: "Search, add, or review your thoughts",
    color: "#065f46",
    system: `You are Caleb's personal knowledge manager. You help him:
- Search and retrieve thoughts from his brain
- Save new thoughts and ideas
- Review his weekly digest
- Find connections between ideas
Always reference specific things from his brain when relevant. Keep responses concise.`,
    welcome: "What would you like to do with your brain? Search for something, add a thought, or see your latest digest."
  },
  general: {
    icon: "💬", name: "General Agent",
    desc: "Talk about anything",
    hint: "Ask me anything",
    color: "#92400e",
    system: `You are a helpful personal AI assistant for Caleb Fisher, a GCU student. You know he is building an AI brain system and is interested in AI, automation, business management, history, and finance. Be conversational, direct, and practical. Draw on his interests when relevant.`,
    welcome: "Hey Caleb! What's on your mind?"
  }
};

let currentAgent = "homework";
let histories = { homework: [], research: [], brain: [], general: [] };

function getStorageKey(agent) { return `agent_history_${agent}`; }

function saveHistory(agent) {
  localStorage.setItem(getStorageKey(agent), JSON.stringify(histories[agent]));
}

function loadHistory(agent) {
  try {
    const saved = localStorage.getItem(getStorageKey(agent));
    return saved ? JSON.parse(saved) : [];
  } catch { return []; }
}

function timeStr() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function addMsg(role, text, save = true) {
  const msgs = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="msg-bubble">${text.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div><div class="msg-time">${role !== "system" ? timeStr() : ""}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  if (save && role !== "system") {
    histories[currentAgent].push({ role, content: text });
    saveHistory(currentAgent);
  }
}

function renderHistory() {
  const msgs = document.getElementById("messages");
  msgs.innerHTML = "";
  const agent = AGENTS[currentAgent];
  if (histories[currentAgent].length === 0) {
    addMsg("system", agent.welcome, false);
  } else {
    histories[currentAgent].forEach(m => addMsg(m.role, m.content, false));
  }
}

async function searchBrain(query) {
  const { data } = await db.from("thoughts").select("content,category,summary").ilike("content", `%${query}%`).order("created_at", { ascending: false }).limit(5);
  return data || [];
}

async function callLLM(messages, systemPrompt) {
  const lastMsg = messages[messages.length - 1]?.content || "";
  const res = await fetch(`${SUPABASE_URL}/functions/v1/call-llm`, {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${SUPABASE_KEY}` },
    body: JSON.stringify({ systemPrompt, prompt: lastMsg, maxTokens: 1024 }),
  });
  const data = await res.json();
  return data.text || "Sorry, I couldn't get a response.";
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  autoResize(input);
  document.getElementById("send-btn").disabled = true;

  addMsg("user", text);

  // Show typing
  const typing = document.getElementById("typing");
  typing.style.display = "flex";
  document.getElementById("messages").scrollTop = 99999;

  try {
    const agent = AGENTS[currentAgent];
    let contextText = text;

    // For brain/research/homework agents, search the brain
    if (["brain", "research", "homework"].includes(currentAgent)) {
      const brainResults = await searchBrain(text.split(" ").slice(0, 5).join(" "));
      if (brainResults.length) {
        contextText += "\n\n[Relevant notes from your brain:\n" + brainResults.map(r => `- ${r.content.slice(0, 200)}`).join("\n") + "]";
      }
    }

    // For brain agent: handle save commands
    if (currentAgent === "brain" && /save|add|remember|capture/i.test(text)) {
      const thought = text.replace(/^(save|add|remember|capture)[:\s]*/i, "").trim();
      if (thought.length > 10) {
        await db.from("thoughts").insert({ content: thought });
        typing.style.display = "none";
        addMsg("assistant", `✅ Saved to your brain: "${thought.slice(0, 100)}"`);
        document.getElementById("send-btn").disabled = false;
        return;
      }
    }

    // For brain agent: handle digest request
    if (currentAgent === "brain" && /digest|summary|week/i.test(text)) {
      const { data } = await db.from("thoughts").select("content").eq("category", "digest").order("created_at", { ascending: false }).limit(1);
      if (data && data[0]) {
        typing.style.display = "none";
        addMsg("assistant", data[0].content);
        document.getElementById("send-btn").disabled = false;
        return;
      }
    }

    const reply = await callLLM(histories[currentAgent], agent.system + "\n\nContext: " + contextText);
    typing.style.display = "none";
    addMsg("assistant", reply);

    // For homework: auto-copy to clipboard
    if (currentAgent === "homework" && reply.length > 100) {
      try {
        await navigator.clipboard.writeText(reply);
        addMsg("system", "📋 Response copied to clipboard — go paste it in your submission box (Cmd+V)", false);
      } catch {}
    }

  } catch (e) {
    typing.style.display = "none";
    addMsg("assistant", "Something went wrong. Try again.");
  }

  document.getElementById("send-btn").disabled = false;
  input.focus();
}

function switchAgent(agent) {
  currentAgent = agent;
  document.querySelectorAll(".agent-item").forEach(el => el.classList.remove("active"));
  document.getElementById(`tab-${agent}`).classList.add("active");

  const a = AGENTS[agent];
  document.getElementById("agent-icon").textContent = a.icon;
  document.getElementById("agent-name").textContent = a.name;
  document.getElementById("agent-desc").textContent = a.desc;
  document.getElementById("input-hint").textContent = `Tip: ${a.hint}`;
  document.getElementById("input").placeholder = `Message ${a.name}...`;

  histories[agent] = loadHistory(agent);
  renderHistory();
}

function clearChat() {
  if (!confirm("Clear this chat history?")) return;
  histories[currentAgent] = [];
  saveHistory(currentAgent);
  renderHistory();
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
}

function autoResize(el) {
  el.style.height = "44px";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

// Init
Object.keys(histories).forEach(a => histories[a] = loadHistory(a));
renderHistory();
</script>
</body>
</html>
