<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Brain Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* Top bar */
  .topbar { background: #1a1a1a; border-bottom: 1px solid #2a2a2a; padding: 10px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .topbar h1 { font-size: 16px; font-weight: 600; color: #fff; margin-right: auto; }
  .agent-btn { padding: 7px 16px; border-radius: 20px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; }
  .agent-btn.homework { background: #7c3aed; color: #fff; }
  .agent-btn.homework:hover { background: #6d28d9; }
  .agent-btn.search { background: #0369a1; color: #fff; }
  .agent-btn.search:hover { background: #0284c7; }
  .agent-btn.add { background: #065f46; color: #fff; }
  .agent-btn.add:hover { background: #047857; }
  .agent-btn.digest { background: #92400e; color: #fff; }
  .agent-btn.digest:hover { background: #b45309; }

  /* Main layout */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Graph area */
  #graph-container { flex: 1; position: relative; background: #0f0f0f; }
  #graph { width: 100%; height: 100%; }
  .graph-overlay { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 8px; font-size: 12px; color: #888; }

  /* Chat panel */
  .chat-panel { width: 380px; background: #141414; border-left: 1px solid #2a2a2a; display: flex; flex-direction: column; flex-shrink: 0; }
  .chat-header { padding: 14px 16px; border-bottom: 1px solid #2a2a2a; font-size: 13px; font-weight: 600; color: #aaa; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 100%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.5; white-space: pre-wrap; }
  .msg.user { background: #1e3a5f; color: #e0e0e0; align-self: flex-end; border-bottom-right-radius: 4px; }
  .msg.assistant { background: #1e1e1e; color: #e0e0e0; border: 1px solid #2a2a2a; border-bottom-left-radius: 4px; }
  .msg.system { background: transparent; color: #555; font-size: 12px; text-align: center; }
  .typing { color: #555; font-size: 12px; padding: 4px 14px; }
  .chat-input-area { padding: 12px; border-top: 1px solid #2a2a2a; display: flex; gap: 8px; }
  .chat-input-area textarea { flex: 1; background: #1e1e1e; border: 1px solid #333; border-radius: 8px; color: #e0e0e0; padding: 10px 12px; font-size: 13px; resize: none; height: 40px; font-family: inherit; line-height: 1.4; }
  .chat-input-area textarea:focus { outline: none; border-color: #7c3aed; }
  .send-btn { background: #7c3aed; border: none; border-radius: 8px; color: #fff; padding: 0 14px; cursor: pointer; font-size: 18px; }
  .send-btn:hover { background: #6d28d9; }
</style>
</head>
<body>

<div class="topbar">
  <h1>🧠 My Brain</h1>
  <button class="agent-btn homework" onclick="runHomework()">📚 Homework Agent</button>
  <button class="agent-btn search" onclick="runSearch()">🔍 Search Brain</button>
  <button class="agent-btn add" onclick="runAdd()">➕ Add Thought</button>
  <button class="agent-btn digest" onclick="runDigest()">📊 Weekly Digest</button>
</div>

<div class="main">
  <div id="graph-container">
    <div id="graph"></div>
    <div class="graph-overlay" id="graph-status">Loading brain...</div>
  </div>
  <div class="chat-panel">
    <div class="chat-header">💬 Chat with your brain</div>
    <div class="chat-messages" id="messages">
      <div class="msg system">Your agents are ready above. Ask anything or click an agent button.</div>
    </div>
    <div class="typing" id="typing"></div>
    <div class="chat-input-area">
      <textarea id="chat-input" placeholder="Ask your brain anything..." onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" onclick="sendMessage()">↑</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://yqjsfeboqsotrgknyzkb.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxanNmZWJvcXNvdHJna255emtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNTI4OTIsImV4cCI6MjA5NzkyODg5Mn0.G9xlPmiHivtf4Pss0Ja0m2YnT2qHh__9izkv0EXC_B8";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let chatHistory = [];

// ── Graph ──────────────────────────────────────────────────────
async function loadGraph() {
  const { data: thoughts } = await db.from("thoughts").select("id,content,tags,category,created_at").order("created_at", { ascending: false }).limit(100);
  if (!thoughts) return;

  const nodes = [], edges = [];
  const tagMap = {};

  thoughts.forEach(t => {
    const label = (t.content || "").slice(0, 30) + (t.content?.length > 30 ? "…" : "");
    const colors = { learning: "#7c3aed", idea: "#0369a1", reflection: "#065f46", digest: "#92400e", question: "#b91c1c", plan: "#0f766e" };
    nodes.push({ id: t.id, label, title: t.content?.slice(0, 200), color: { background: colors[t.category] || "#2a2a2a", border: "#444", highlight: { background: "#7c3aed", border: "#a855f7" } }, font: { color: "#ccc", size: 11 }, size: 14 });

    (t.tags || []).forEach(tag => {
      if (!tagMap[tag]) tagMap[tag] = [];
      tagMap[tag].push(t.id);
    });
  });

  Object.values(tagMap).forEach(ids => {
    for (let i = 0; i < ids.length - 1; i++) {
      edges.push({ from: ids[i], to: ids[i+1], color: { color: "#333", highlight: "#7c3aed" }, width: 1 });
    }
  });

  const container = document.getElementById("graph");
  new vis.Network(container, { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) }, {
    physics: { stabilization: { iterations: 100 }, barnesHut: { gravitationalConstant: -3000, springLength: 120 } },
    interaction: { hover: true, tooltipDelay: 200 },
    nodes: { borderWidth: 1, shape: "dot" },
  });

  document.getElementById("graph-status").textContent = `${thoughts.length} thoughts`;
}

// ── Chat ──────────────────────────────────────────────────────
function addMsg(role, text) {
  const div = document.createElement("div");
  div.className = `msg ${role}`;
  div.textContent = text;
  document.getElementById("messages").appendChild(div);
  div.scrollIntoView({ behavior: "smooth" });
  return div;
}

async function callLLM(userMessage, systemPrompt) {
  const res = await fetch(`${SUPABASE_URL}/functions/v1/call-llm`, {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${SUPABASE_ANON_KEY}` },
    body: JSON.stringify({ prompt: userMessage, systemPrompt: systemPrompt || "You are a helpful personal AI assistant with access to the user's knowledge base. Be concise and practical.", maxTokens: 1024 }),
  });
  const data = await res.json();
  return data.text || "Sorry, I couldn't get a response.";
}

async function searchBrain(query) {
  const { data } = await db.from("thoughts").select("content,category,created_at").ilike("content", `%${query}%`).order("created_at", { ascending: false }).limit(5);
  return data || [];
}

async function sendMessage(overrideText) {
  const input = document.getElementById("chat-input");
  const text = overrideText || input.value.trim();
  if (!text) return;
  input.value = "";

  addMsg("user", text);
  chatHistory.push({ role: "user", content: text });

  document.getElementById("typing").textContent = "Thinking...";

  const results = await searchBrain(text.split(" ").slice(0, 5).join(" "));
  const context = results.length ? "\n\nRelevant from your brain:\n" + results.map(r => `- ${r.content.slice(0, 150)}`).join("\n") : "";

  const reply = await callLLM(text + context);
  document.getElementById("typing").textContent = "";
  addMsg("assistant", reply);
  chatHistory.push({ role: "assistant", content: reply });
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

// ── Agent Buttons ─────────────────────────────────────────────
async function runHomework() {
  // Check if Claude in Chrome extension can read a GCU tab
  addMsg("system", "📚 Homework Agent activated");

  // Try to get question from extension message, otherwise prompt user
  const question = await getGCUQuestion();
  if (question) {
    addMsg("user", "Run homework agent on: " + question.slice(0, 100) + "...");
    document.getElementById("typing").textContent = "Reading your GCU page and generating outline...";
    const res = await fetch(`${SUPABASE_URL}/functions/v1/call-llm`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${SUPABASE_ANON_KEY}` },
      body: JSON.stringify({
        systemPrompt: "You are an expert academic writing assistant. Help students understand discussion questions and create strong outlines. Always end with: ✏️ Write this in your own words and submit it yourself.",
        prompt: `Discussion question from GCU:\n\n${question}\n\nProvide:\n1. WHAT THIS IS ASKING (plain English)\n2. KEY POINTS TO HIT (3-5 bullets)\n3. SUGGESTED OUTLINE (intro, body, conclusion)\n4. WRITING TIPS`,
        maxTokens: 1024,
      }),
    });
    const data = await res.json();
    document.getElementById("typing").textContent = "";
    addMsg("assistant", data.text || "Could not generate outline.");
  } else {
    addMsg("assistant", "I couldn't read your GCU tab automatically.\n\nMake sure:\n1. You have a GCU discussion page open in another tab\n2. The Claude in Chrome extension is active\n\nOr paste your discussion question here and I'll outline it for you.");
    document.getElementById("chat-input").placeholder = "Paste your discussion question here...";
    document.getElementById("chat-input").focus();
  }
}

async function getGCUQuestion() {
  // Listen for message from the GCU Chrome extension content script
  return new Promise((resolve) => {
    const handler = (event) => {
      if (event.data && event.data.type === "GCU_QUESTION") {
        window.removeEventListener("message", handler);
        resolve(event.data.question);
      }
    };
    window.addEventListener("message", handler);
    // Ask extension to read the GCU tab
    window.postMessage({ type: "READ_GCU_TAB" }, "*");
    // Timeout after 3 seconds — fall back to manual
    setTimeout(() => { window.removeEventListener("message", handler); resolve(null); }, 3000);
  });
}

async function runSearch() {
  const query = prompt("What do you want to search for in your brain?");
  if (!query) return;
  addMsg("user", "Search brain for: " + query);
  const results = await searchBrain(query);
  if (results.length) {
    addMsg("assistant", `Found ${results.length} thoughts:\n\n` + results.map(r => `• ${r.content.slice(0, 150)}`).join("\n\n"));
  } else {
    addMsg("assistant", "Nothing found for: " + query);
  }
}

async function runAdd() {
  const thought = prompt("What thought do you want to save?");
  if (!thought) return;
  addMsg("user", "Save thought: " + thought);
  await db.from("thoughts").insert({ content: thought });
  addMsg("assistant", "✅ Saved to your brain!");
}

async function runDigest() {
  addMsg("user", "Show me my latest weekly digest");
  const { data } = await db.from("thoughts").select("content,created_at").eq("category", "digest").order("created_at", { ascending: false }).limit(1);
  if (data && data[0]) {
    addMsg("assistant", data[0].content);
  } else {
    addMsg("assistant", "No digest found yet. Your weekly digest runs every Sunday automatically.");
  }
}

// ── Auto-run homework if question passed in URL ───────────────
function checkURLForHomework() {
  const params = new URLSearchParams(window.location.search);
  const hw = params.get("hw");
  if (hw) {
    setTimeout(() => {
      addMsg("system", "📚 Homework Agent activated from GCU tab");
      runHomeworkWithQuestion(decodeURIComponent(hw));
    }, 1000);
  }
}

async function runHomeworkWithQuestion(question) {
  addMsg("user", "Discussion question: " + question.slice(0, 120) + (question.length > 120 ? "..." : ""));
  document.getElementById("typing").textContent = "Searching your brain and generating outline...";

  const results = await searchBrain(question.split(" ").slice(0, 6).join(" "));
  const context = results.length ? "\n\nRelevant from your brain:\n" + results.map(r => `- ${r.content.slice(0, 150)}`).join("\n") : "";

  const res = await fetch(`${SUPABASE_URL}/functions/v1/call-llm`, {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${SUPABASE_ANON_KEY}` },
    body: JSON.stringify({
      systemPrompt: "You are an expert academic writing assistant. Help students understand discussion questions and create strong outlines. Always end with: ✏️ Write this in your own words and submit it yourself.",
      prompt: `Discussion question:\n\n${question}${context}\n\nProvide:\n1. WHAT THIS IS ASKING (plain English)\n2. KEY POINTS TO HIT (3-5 bullets)\n3. SUGGESTED OUTLINE (intro, body, conclusion)\n4. WRITING TIPS`,
      maxTokens: 1024,
    }),
  });
  const data = await res.json();
  document.getElementById("typing").textContent = "";
  addMsg("assistant", data.text || "Could not generate outline.");
}

// ── Init ──────────────────────────────────────────────────────
loadGraph();
checkURLForHomework();
</script>
</body>
</html>
